<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Do'kon</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- Yuklanish ekrani -->
  <div id="splash" class="splash"><div class="spinner"></div></div>

  <!-- Yuqori panel -->
  <header id="topbar" class="topbar">
    <div class="topbar-row">
      <div class="shop-title" id="shopTitle">Do'kon</div>
      <button class="lang-btn" id="langBtn">UZ</button>
    </div>
    <div class="search-box" id="searchBox">
      <span class="search-ic">🔍</span>
      <input type="text" id="searchInput" placeholder="Qidirish..." autocomplete="off" />
      <button class="search-clear" id="searchClear" hidden>✕</button>
    </div>
  </header>

  <main id="app">
    <!-- HOME -->
    <section id="view-home" class="view active">
      <div id="closedBanner" class="closed-banner" hidden>⏰ Do'kon hozir yopiq</div>
      <div id="banners" class="banners"></div>
      <div id="categories" class="cat-strip"></div>
      <h2 class="section-title" id="productsTitle">Mahsulotlar</h2>
      <div id="products" class="grid"></div>
      <div id="emptyProducts" class="empty" hidden>Mahsulot topilmadi 🛒</div>
    </section>

    <!-- ORDERS -->
    <section id="view-orders" class="view">
      <h2 class="section-title">Buyurtmalarim</h2>
      <div id="ordersList" class="orders-list"></div>
      <div id="emptyOrders" class="empty" hidden>Sizda hali buyurtmalar yo'q 📦</div>
    </section>
  </main>

  <!-- Mahsulot pastki oynasi -->
  <div id="sheetProduct" class="sheet">
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-card">
      <div class="sheet-handle"></div>
      <div id="productContent"></div>
    </div>
  </div>

  <!-- Savat pastki oynasi -->
  <div id="sheetCart" class="sheet">
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-card tall">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">🛒 Savat</h2>
      <div id="cartItems" class="cart-items"></div>
      <div id="cartEmpty" class="empty" hidden>Savat bo'sh</div>
      <div id="cartFooter" class="cart-footer"></div>
    </div>
  </div>

  <!-- Checkout pastki oynasi -->
  <div id="sheetCheckout" class="sheet">
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-card tall">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">Buyurtmani rasmiylashtirish</h2>
      <div id="checkoutContent"></div>
    </div>
  </div>

  <!-- Pastki navigatsiya -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home"><span>🏠</span><small>Asosiy</small></button>
    <button class="nav-item" data-nav="search"><span>🔍</span><small>Qidiruv</small></button>
    <button class="nav-item cart-nav" data-nav="cart"><span>🛒</span><small>Savat</small><b id="cartBadge" class="badge" hidden>0</b></button>
    <button class="nav-item" data-nav="orders"><span>📦</span><small>Buyurtmalar</small></button>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
